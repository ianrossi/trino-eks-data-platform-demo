apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: spark-pi
  namespace: spark
spec:
  type: Scala
  mode: cluster
  image: spark:3.5.0
  imagePullPolicy: IfNotPresent
  mainClass: org.apache.spark.examples.SparkPi
  mainApplicationFile: local:///opt/spark/examples/jars/spark-examples_2.12-3.5.0.jar
  sparkVersion: 3.5.0
  restartPolicy:
    type: Never
  driver:
    cores: 1
    coreLimit: 1000m
    memory: 512m
    serviceAccount: spark-operator-spark
    labels:
      version: 3.5.0
    nodeSelector:
      workload-class: data
  executor:
    instances: 1
    cores: 1
    coreLimit: 1000m
    memory: 512m
    labels:
      version: 3.5.0
    nodeSelector:
      workload-class: data
