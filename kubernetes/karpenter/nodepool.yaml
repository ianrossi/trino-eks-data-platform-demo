apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: data-general
spec:
  amiFamily: AL2023
  amiSelectorTerms:
    - alias: al2023@latest
  role: trino-eks-karpenter-karpenter-node
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: trino-eks-karpenter
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: trino-eks-karpenter
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        encrypted: true
  tags:
    Project: trino-eks-karpenter
    karpenter.sh/discovery: trino-eks-karpenter
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: data-general
spec:
  template:
    metadata:
      labels:
        workload-class: data
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: data-general
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["3"]
      expireAfter: 720h
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 60s
  limits:
    cpu: "20"
    memory: 80Gi
