apiVersion: batch/v1
kind: Job
metadata:
  name: realtime-orders-topic
  namespace: streaming
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        workload-class: data
      containers:
        - name: create-topic
          image: redpandadata/redpanda:v26.1.12
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
          args:
            - |
              set -euo pipefail
              until rpk cluster info --brokers kafka.streaming.svc.cluster.local:9092 >/dev/null 2>&1; do
                sleep 5
              done
              rpk topic create realtime-orders \
                --brokers kafka.streaming.svc.cluster.local:9092 \
                --partitions 1 \
                --replicas 1 || true
          resources:
            requests:
              cpu: "100m"
              memory: 256Mi
            limits:
              memory: 512Mi
